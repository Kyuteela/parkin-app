    <title>ParkIn - Beranda</title>

            <p class="greeting">Selamat datang,</p>
            <h2 class="user-name">Muhammad Ushaim</h2>
            <div class="search-box">

                    <div class="map-block"></div>
                    <div class="map-block"></div>
                    <div class="map-block"></div>
                    <div class="map-block"></div>
                    <div class="map-block"></div>
                    <div class="map-block"></div>
                    <div class="map-block"></div>
                    <div class="map-block"></div>
                    <div class="map-block"></div>
                    <div class="map-block"></div>
                    <div class="map-block"></div>
                    <div class="map-block"></div>
                </div>

                    <div class="marker-label">Parkir Pujas UB</div>

                        <rect width="36" height="36" rx="18" fill="#FFF0EA"/>
                        <rect x="0.5" y="0.5" width="35" height="35" rx="17.5" stroke="black" stroke-opacity="0.5"/>

                    </svg>
                </div>

                <div class="map-marker marker-current">
                    <svg width="19" height="19" viewBox="0 0 19 19" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="9.5" cy="9.5" r="9.5" fill="#C4D9FC"/>
                        <circle cx="9.50029" cy="9.50001" r="6.04545" fill="#3B82F6"/>
                        <circle cx="9.50009" cy="9.50003" r="2.59091" fill="#F5F5F5"/>
                    </svg>
                </div>
            </div>

            <section class="parking-section">
                <h3 class="section-title">Parkir Terdekat</h3>
                
                <div class="parking-list">
                    <div class="parking-card" id="cardGate3">
                        <div class="card-left">
                            <div class="p-icon-bg orange-bg"><span>P</span></div>
                            <div class="card-info">
                                <h4>Parkir UB Gate 3</h4>
                                <p>0.3 km &middot; Rp 2.000/jam</p>
                            </div>
                        </div>
                        <div class="badge badge-available">12 slot</div>
                    </div>

                    <div class="parking-card" id="cardPujas">
                        <div class="card-left">
                            <div class="p-icon-bg gray-bg"><span>P</span></div>
                            <div class="card-info">
                                <h4>Parkir Pujas UB</h4>
                                <p>1.2 km &middot; Rp 2.000/jam</p>
                            </div>
                        </div>
                        <div class="badge badge-full">Penuh</div>
                    </div>
                </div>
            </section>
        </main>
