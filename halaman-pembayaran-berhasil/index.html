<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pembayaran Berhasil — ParkIn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-decoration">
    <div class="bg-circle bg-circle--1"></div>
    <div class="bg-circle bg-circle--2"></div>
    <div class="bg-grid"></div>
  </div>

  <main class="page-wrapper">
    <div class="card" id="mainCard">

      <div class="success-icon-wrapper">
        <div class="success-ring success-ring--3"></div>
        <div class="success-ring success-ring--2"></div>
        <div class="success-ring success-ring--1"></div>
        <div class="success-icon">
          <svg class="checkmark" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle class="checkmark__circle" cx="26" cy="26" r="24" stroke="#16a34a" stroke-width="2.5"/>
            <polyline class="checkmark__check" points="14,26 22,34 38,18" stroke="#16a34a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <div class="header">
        <h1 class="title">Pembayaran Berhasil!</h1>
        <p class="subtitle">Reservasi parkir kamu sudah dikonfirmasi</p>
      </div>

      <div class="transaction-badge">
        <span class="transaction-label">ID Transaksi</span>
        <span class="transaction-id" id="transactionId">PRK-2024-00847</span>
        <button class="copy-btn" id="copyBtn" title="Salin ID">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </button>
      </div>

      <div class="detail-card">
        <div class="detail-row">
          <span class="detail-label">
            <svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
              <circle cx="12" cy="10" r="3"></circle>
            </svg>
            Lokasi
          </span>
          <span class="detail-value">UB Gate 3</span>
        </div>

        <div class="detail-divider"></div>

        <div class="detail-row">
          <span class="detail-label">
            <svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            Slot
          </span>
          <span class="detail-value slot-badge">A4 — Zona A</span>
        </div>

        <div class="detail-divider"></div>

        <div class="detail-row">
          <span class="detail-label">
            <svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            Durasi
          </span>
          <span class="detail-value">1 Jam</span>
        </div>

        <div class="detail-divider"></div>

        <div class="detail-row">
          <span class="detail-label">
            <svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
              <line x1="1" y1="10" x2="23" y2="10"></line>
            </svg>
            Metode
          </span>
          <span class="detail-value">
            <span class="qris-badge">QRIS</span>
          </span>
        </div>

        <div class="detail-divider"></div>

        <div class="detail-row detail-row--total">
          <span class="detail-label">Total Dibayar</span>
          <span class="detail-value total-amount">Rp 2.000</span>
        </div>
      </div>

      <div class="timestamp">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
        <span id="currentTime"></span>
      </div>

      <div class="actions">
        <button class="btn btn--primary" id="tiketBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"></path>
            <path d="M13 5v2"></path>
            <path d="M13 17v2"></path>
            <path d="M13 11v2"></path>
          </svg>
          Lihat Tiket Parkir
        </button>
        <button class="btn btn--secondary" id="berandaBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          Kembali ke Beranda
        </button>
      </div>

    </div>

    <div class="brand-footer">
      <span class="brand-name">ParkIn</span>
      <span class="brand-dot">•</span>
      <span class="brand-tagline">Smart Parking Solution</span>
    </div>
  </main>

  <div class="toast" id="toast">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
    ID Transaksi disalin!
  </div>

  <script src="script.js"></script>
</body>
</html>
